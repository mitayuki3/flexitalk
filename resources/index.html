<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>NeutralinoJs sample app</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="neutralinoapp">
      <h1>NeutralinoJs</h1>
      <div id="info"></div>
      <br/>
      <img src="/icons/logo.gif" alt="Neutralinojs" />
      <div>
        <a href="#" onclick="openDocs();">Docs</a> &middot;  
        <a href="#" onclick="openTutorial();">Video tutorial</a>
      </div>
      <br/>
      <div id="llamacpp-ui">
        <input type="text" id="api-url" value="http://localhost:8080" placeholder="API Base URL" style="width: 300px;">
        <br/><br/>
        <textarea id="prompt" rows="4" cols="50" placeholder="Ask llama.cpp..."></textarea>
        <br/>
        <button onclick="llamaCompletion();">Generate</button>
        <div id="response" style="margin-top: 10px; border: 1px solid #ccc; padding: 10px; min-height: 20px; white-space: pre-wrap;"></div>
      </div>
    </div>
    <!-- Neutralino.js client. This file is gitignored, 
        because `neu update` typically downloads it.
        Avoid copy-pasting it. 
        -->
    <script src="/js/neutralino.js"></script>
    <!-- Your app's source files -->
    <script src="/js/main.js"></script>
  </body>
</html>
